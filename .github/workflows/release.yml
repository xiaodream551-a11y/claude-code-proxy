name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  BIN_NAME: claude-code-proxy
  RELEASE_REPOSITORY: ${{ github.repository }}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        # Keep warnings fatal while carrying a narrow, explicit baseline for
        # pre-existing monitor/Cursor lint debt outside the Codex/Grok scope.
        run: >-
          cargo clippy --all-targets --locked -- -D warnings
          -A clippy::empty_line_after_doc_comments
          -A clippy::manual_is_multiple_of
          -A clippy::too_many_arguments
          -A clippy::collapsible_if
          -A clippy::manual_div_ceil
          -A clippy::redundant_closure
          -A clippy::let_and_return
          -A clippy::unnecessary_filter_map
          -A clippy::if_same_then_else
          -A clippy::needless_borrow
          -A clippy::await_holding_lock
          -A clippy::manual_strip
      - name: Build
        run: cargo build --all --locked
      - name: Test
        run: cargo test --all --locked

  build:
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin-arm64
            ext: ""
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: darwin-amd64
            ext: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-amd64
            ext: ""
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-amd64
            ext: .exe
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: windows-arm64
            ext: .exe
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: |
          cargo build --release --locked --target ${{ matrix.target }}
      - name: Verify Unix binary
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          expected="claude-code-proxy ${VERSION#v}"
          actual="$("target/${{ matrix.target }}/release/${BIN_NAME}" --version)"
          test "$actual" = "$expected"
      - name: Verify Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $expected = "claude-code-proxy $($env:VERSION.TrimStart('v'))"
          $actual = & "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" --version
          if ($actual -ne $expected) {
            Write-Error "expected '$expected', got '$actual'"
          }
      - name: Package Unix
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          binary="target/${{ matrix.target }}/release/${BIN_NAME}"
          cp "$binary" "dist/${BIN_NAME}"
          archive="${BIN_NAME}-${{ matrix.platform }}.${{ matrix.archive }}"
          tar -C dist -czf "$archive" "${BIN_NAME}"
          shasum -a 256 "$archive" > "${BIN_NAME}-${{ matrix.platform }}.sha256"
          identity="$("$binary" version --json)"
          checkout_sha="$(git rev-parse HEAD)"
          binary_sha="$(shasum -a 256 "$binary" | awk '{print $1}')"
          archive_sha="$(awk '{print $1}' "${BIN_NAME}-${{ matrix.platform }}.sha256")"
          IDENTITY_JSON="$identity" CHECKOUT_SHA="$checkout_sha" BINARY_SHA="$binary_sha" ARCHIVE_SHA="$archive_sha" \
            PLATFORM="${{ matrix.platform }}" python3 -c 'import json,os; d=json.loads(os.environ["IDENTITY_JSON"]); assert d["gitDirty"] is False; assert d["gitSha"] == os.environ["CHECKOUT_SHA"]; assert d["binarySha256"] == os.environ["BINARY_SHA"]; print(json.dumps({"repository":os.environ["GITHUB_REPOSITORY"],"tag":os.environ["GITHUB_REF_NAME"],"gitSha":d["gitSha"],"binarySha256":d["binarySha256"],"archiveSha256":os.environ["ARCHIVE_SHA"],"platform":os.environ["PLATFORM"]},separators=(",",":")))' \
            > "${BIN_NAME}-${{ matrix.platform }}.provenance.json"
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" "dist/${env:BIN_NAME}.exe"
          $archive = "${env:BIN_NAME}-${{ matrix.platform }}.${{ matrix.archive }}"
          Compress-Archive -Path "dist/${env:BIN_NAME}.exe" -DestinationPath $archive -Force
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Out-File -FilePath "${env:BIN_NAME}-${{ matrix.platform }}.sha256" -Encoding ascii
          $binary = "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe"
          $identity = (& $binary version --json | ConvertFrom-Json)
          $checkoutSha = (git rev-parse HEAD).Trim()
          $binaryHash = (Get-FileHash -Algorithm SHA256 $binary).Hash.ToLower()
          if ($identity.gitDirty -or $identity.gitSha -ne $checkoutSha -or $identity.binarySha256 -ne $binaryHash) {
            throw "binary provenance does not match the release checkout"
          }
          [ordered]@{
            repository = $env:GITHUB_REPOSITORY
            tag = $env:GITHUB_REF_NAME
            gitSha = $identity.gitSha
            binarySha256 = $identity.binarySha256
            archiveSha256 = $hash
            platform = "${{ matrix.platform }}"
          } | ConvertTo-Json -Compress | Set-Content -NoNewline -Encoding utf8 "${env:BIN_NAME}-${{ matrix.platform }}.provenance.json"
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ${{ matrix.platform }}
          path: |
            ${{ env.BIN_NAME }}-${{ matrix.platform }}.${{ matrix.archive }}
            ${{ env.BIN_NAME }}-${{ matrix.platform }}.sha256
            ${{ env.BIN_NAME }}-${{ matrix.platform }}.provenance.json

  smoke-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: windows-amd64
      - shell: pwsh
        run: |
          Expand-Archive claude-code-proxy-windows-amd64.zip -DestinationPath .
          .\claude-code-proxy.exe --version

  release:
    needs: [build, smoke-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          merge-multiple: true
      - name: Require immutable releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          enabled="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/immutable-releases" \
            --jq '.enabled')"
          if [ "$enabled" != "true" ]; then
            echo "Enable immutable releases in repository settings before publishing." >&2
            exit 1
          fi
      - name: Attest release archives
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            *.tar.gz
            *.zip
      - name: Publish immutable-ready release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --verify-tag
          --generate-notes
          ./*.tar.gz ./*.zip ./*.sha256 ./*.provenance.json

  update-tap:
    needs: release
    if: ${{ vars.HOMEBREW_TAP_REPOSITORY != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          merge-multiple: true
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Generate formula and push to tap
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          SHA_ARM=$(awk '{print $1}' claude-code-proxy-darwin-arm64.sha256)
          SHA_INTEL=$(awk '{print $1}' claude-code-proxy-darwin-amd64.sha256)
          SHA_LINUX_AMD=$(awk '{print $1}' claude-code-proxy-linux-amd64.sha256)
          SHA_LINUX_ARM=$(awk '{print $1}' claude-code-proxy-linux-arm64.sha256)

          mkdir -p tap/Formula
          cat > tap/Formula/claude-code-proxy.rb << EOF
          class ClaudeCodeProxy < Formula
            desc "Local proxy: Claude Code to ChatGPT subscription via Codex Responses API"
            homepage "https://github.com/${RELEASE_REPOSITORY}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${RELEASE_REPOSITORY}/releases/download/v${VERSION}/claude-code-proxy-darwin-arm64.tar.gz"
                sha256 "${SHA_ARM}"
              else
                url "https://github.com/${RELEASE_REPOSITORY}/releases/download/v${VERSION}/claude-code-proxy-darwin-amd64.tar.gz"
                sha256 "${SHA_INTEL}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${RELEASE_REPOSITORY}/releases/download/v${VERSION}/claude-code-proxy-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              else
                url "https://github.com/${RELEASE_REPOSITORY}/releases/download/v${VERSION}/claude-code-proxy-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD}"
              end
            end

            def install
              bin.install "claude-code-proxy"
            end

            service do
              state_home = ENV.fetch("XDG_STATE_HOME", "#{Dir.home}/.local/state")

              run [opt_bin/"claude-code-proxy", "serve", "--no-monitor"]
              keep_alive true
              environment_variables XDG_STATE_HOME: state_home
              log_path "#{state_home}/claude-code-proxy/service.log"
              error_log_path "#{state_home}/claude-code-proxy/service.log"
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/claude-code-proxy --version")
            end
          end
          EOF
          sed -i 's/^          //' tap/Formula/claude-code-proxy.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-code-proxy.rb
          git commit -m "claude-code-proxy ${VERSION}"
          git pull --rebase
          git push
