name: Nix

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
      - name: Build package
        run: |
          for attempt in 1 2 3 4 5; do
            if nix build --no-link --print-build-logs --option sandbox false --option max-jobs 1; then
              exit 0
            fi
            if [ "$attempt" = 5 ]; then
              exit 1
            fi
            sleep 10
          done
